<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Plan your perfect trip with AI — smart travel itinerary planner" />
  <title>AI Travel Planner</title>
  <!-- Preconnect for faster Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- font-display:swap via &display=swap prevents render blocking -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" /></noscript>
  <link rel="stylesheet" href="dist/output.css" />
</head>
<body class="bg-gradient-to-br from-[#f8fafc] via-[#f1f5f9] to-[#e2e8f0] dark:from-slate-900 dark:via-slate-900 dark:to-slate-800 text-gray-800 dark:text-gray-100 min-h-screen relative">

  <!-- Background blobs -->
  <div class="blob blob-1 fixed"></div>
  <div class="blob blob-2 fixed"></div>
  <div class="blob blob-3 fixed"></div>

  <!-- Navbar Skeleton - Fixed Overlay -->
  <div id="skeleton-loader" class="fixed inset-0 z-50 bg-gradient-to-br from-[#f8fafc] via-[#f1f5f9] to-[#e2e8f0] dark:from-slate-900 dark:via-slate-900 dark:to-slate-800 overflow-y-auto">
    <nav class="sticky top-0 z-40 nav-blur">
      <div class="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
        <div class="h-8 w-48 rounded-xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
        <div class="h-12 w-12 rounded-xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
      </div>
    </nav>

    <!-- Main Skeleton -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-12 sm:py-16">
      <!-- Hero Skeleton -->
      <header class="text-center mb-12">
        <div class="h-12 sm:h-16 lg:h-20 max-w-3xl mx-auto rounded-2xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
        <div class="mt-4 h-6 max-w-xl mx-auto rounded-lg bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
      </header>

      <!-- Form Card Skeleton -->
      <section class="relative">
        <div class="relative bg-gradient-to-br from-white to-gray-50 dark:from-slate-800/60 dark:to-slate-800/30 rounded-2xl sm:rounded-3xl p-6 sm:p-8 card-lift">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="sm:col-span-2 space-y-2">
              <div class="h-5 w-20 rounded-lg bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
              <div class="h-14 w-full rounded-xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
            </div>
            <div class="space-y-2">
              <div class="h-5 w-24 rounded-lg bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
              <div class="h-14 w-full rounded-xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
            </div>
            <div class="space-y-2">
              <div class="h-5 w-16 rounded-lg bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
              <div class="h-14 w-full rounded-xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
            </div>
            <div class="space-y-2">
              <div class="h-5 w-24 rounded-lg bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
              <div class="h-14 w-full rounded-xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
            </div>
            <div class="sm:col-span-2 flex flex-col sm:flex-row gap-4 mt-2">
              <div class="flex-1 h-14 rounded-xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
              <div class="h-14 w-28 rounded-xl bg-gradient-to-r from-gray-200 via-gray-300 to-gray-200 dark:from-gray-700 dark:via-gray-600 dark:to-gray-700 animate-shimmer"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Footer Skeleton Space -->
      <div class="h-10"></div>
    </main>
  </div>

  <!-- Actual Navbar & Content -->
  <div id="main-content" class="hidden opacity-0">
    <!-- Navbar -->
    <nav class="sticky top-0 z-40 nav-blur">
      <div class="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
        <span class="text-lg sm:text-xl font-extrabold bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 dark:from-cyan-400 dark:via-purple-400 dark:to-pink-400 bg-clip-text text-transparent select-none">
          AI Travel Planner 🌍
        </span>
        <button id="themeToggle" class="p-3 rounded-xl bg-gradient-to-br from-gray-100 to-gray-200 dark:from-slate-800 dark:to-slate-700 transition-transform duration-200 ease-out" aria-label="Toggle theme">
          <svg id="sunIcon" class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.34l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          <svg id="moonIcon" class="w-5 h-5 text-indigo-400 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75 9.75 9.75 0 018.25 6c0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25 9.75 9.75 0 0012.75 21a9.753 9.753 0 009.002-5.998z"></path></svg>
        </button>
      </div>
    </nav>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-12 sm:py-16">

      <!-- Hero -->
      <header class="text-center mb-12">
        <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 dark:from-cyan-300 dark:via-purple-400 dark:to-pink-300 bg-clip-text text-transparent leading-tight">
          Your Perfect Trip <br class="sm:hidden" />Starts Here
        </h1>
        <p class="mt-4 text-gray-600 dark:text-slate-400 text-base sm:text-lg max-w-xl mx-auto">Plan your trips smarter with AI — just tell us where you're going</p>
      </header>

      <!-- Form Card -->
      <section class="relative">
        <div class="relative bg-gradient-to-br from-white to-gray-50 dark:from-slate-800/60 dark:to-slate-800/30 rounded-2xl sm:rounded-3xl p-6 sm:p-8 card-lift">
          <form id="travelForm" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="sm:col-span-2">
              <label for="destination" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-2">Where to?</label>
              <input type="text" id="destination" placeholder="e.g. Paris, Tokyo, Bali..." required
                class="w-full px-5 py-4 rounded-xl text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-slate-500" />
            </div>
            <div>
              <label for="days" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-2">How many days?</label>
              <input type="number" id="days" min="1" max="30" value="3" required
                class="w-full px-5 py-4 rounded-xl text-gray-800 dark:text-white" />
            </div>
            <div>
              <label for="budget" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-2">Budget</label>
              <select id="budget"
                class="w-full px-5 py-4 rounded-xl text-gray-800 dark:text-white cursor-pointer">
                <option value="Budget">💰 Budget</option>
                <option value="Mid-range" selected>💵 Mid-range</option>
                <option value="Luxury">✨ Luxury</option>
              </select>
            </div>
            <div>
              <label for="vibe" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-2">Travel Vibe</label>
              <select id="vibe"
                class="w-full px-5 py-4 rounded-xl text-gray-800 dark:text-white cursor-pointer">
                <option value="Adventure">🏔️ Adventure</option>
                <option value="Relaxation">🏖️ Relaxation</option>
                <option value="Cultural">🏛️ Cultural</option>
                <option value="Romantic">💕 Romantic</option>
                <option value="Party">🎉 Party</option>
              </select>
            </div>
            <div class="sm:col-span-2 flex flex-col sm:flex-row gap-4 mt-2">
              <button type="submit" id="generateBtn"
                class="flex-1 px-7 py-4 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 dark:from-cyan-500 dark:via-purple-500 dark:to-pink-500 text-white font-bold text-base rounded-xl shadow-lg shadow-blue-500/20 dark:shadow-cyan-500/15 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:transform-none">
                Generate Plan 🚀
              </button>
              <button type="reset" id="resetBtn"
                class="px-7 py-4 bg-gradient-to-br from-gray-100 to-gray-200 dark:from-slate-800 dark:to-slate-700 text-gray-700 dark:text-slate-300 font-semibold text-base rounded-xl">
                Reset
              </button>
            </div>
          </form>
        </div>
      </section>

      <!-- Loading -->
      <div id="loading" class="hidden flex-col items-center justify-center py-24">
        <div class="relative w-16 h-16 mb-6">
          <div class="absolute inset-0 rounded-full border-4 border-blue-200/60 dark:border-slate-600"></div>
          <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-blue-500 dark:border-t-cyan-400 animate-spin"></div>
        </div>
        <p class="text-gray-600 dark:text-slate-400 text-xl font-semibold">AI is planning your trip...</p>
        <p class="text-gray-500 dark:text-slate-500 text-sm mt-2">Crafting the perfect itinerary ✨</p>
      </div>

      <!-- Error -->
      <div id="error" class="hidden bg-gradient-to-r from-red-50 to-pink-50 dark:from-red-900/20 dark:to-pink-900/10 border border-red-200 dark:border-red-800/40 text-red-600 dark:text-red-300 rounded-2xl p-6 mb-8 text-center"></div>

      <!-- Itinerary Results -->
      <section id="results" class="hidden"></section>

    </main>

    <!-- Footer -->
    <footer class="text-center py-10 text-gray-500 dark:text-slate-500 text-sm border-t border-gray-200 dark:border-slate-800">
      Made with ❤️ &middot; AI Travel Planner
    </footer>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
