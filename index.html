<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Travel Planner</title>
  <link rel="stylesheet" href="dist/output.css" />
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-gray-100 min-h-screen">

  <!-- Theme Toggle -->
  <button id="themeToggle" class="fixed top-4 right-4 z-50 p-3 rounded-xl bg-white dark:bg-slate-800 shadow-lg dark:shadow-slate-900/50 hover:scale-110 transition-transform duration-200 border border-gray-200 dark:border-slate-700" aria-label="Toggle theme">
    <svg id="sunIcon" class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.34l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
    <svg id="moonIcon" class="w-5 h-5 text-indigo-400 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75 9.75 9.75 0 018.25 6c0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25 9.75 9.75 0 0012.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
  </button>

  <!-- Main Container -->
  <main class="max-w-4xl mx-auto px-4 py-8 sm:py-12">

    <!-- Header -->
    <header class="text-center mb-10 animate-fade-in">
      <h1 class="text-4xl sm:text-5xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-cyan-400 dark:to-indigo-400 bg-clip-text text-transparent">
        AI Travel Planner 🌍
      </h1>
      <p class="mt-3 text-gray-500 dark:text-slate-400 text-base sm:text-lg">Your intelligent travel companion — plan trips in seconds</p>
    </header>

    <!-- Form Card -->
    <section class="bg-white dark:glass-dark dark:bg-slate-800/60 rounded-2xl shadow-xl dark:shadow-cyan-900/10 p-6 sm:p-8 mb-8 animate-fade-in border border-gray-100 dark:border-slate-700/50" style="animation-delay:0.1s">
      <form id="travelForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
        <div class="sm:col-span-2">
          <label for="destination" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-1.5">Destination</label>
          <input type="text" id="destination" placeholder="e.g. Paris, Tokyo, Bali..." required
            class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700/50 focus:ring-2 focus:ring-blue-500 dark:focus:ring-cyan-400 focus:border-transparent outline-none transition-all duration-200 placeholder:text-gray-400 dark:placeholder:text-slate-500" />
        </div>
        <div>
          <label for="days" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-1.5">Number of Days</label>
          <input type="number" id="days" min="1" max="30" value="3" required
            class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700/50 focus:ring-2 focus:ring-blue-500 dark:focus:ring-cyan-400 focus:border-transparent outline-none transition-all duration-200" />
        </div>
        <div>
          <label for="budget" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-1.5">Budget</label>
          <select id="budget"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700/50 focus:ring-2 focus:ring-blue-500 dark:focus:ring-cyan-400 focus:border-transparent outline-none transition-all duration-200 appearance-none cursor-pointer">
            <option value="Budget">💰 Budget</option>
            <option value="Mid-range" selected>💵 Mid-range</option>
            <option value="Luxury">✨ Luxury</option>
          </select>
        </div>
        <div>
          <label for="vibe" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-1.5">Travel Vibe</label>
          <select id="vibe"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700/50 focus:ring-2 focus:ring-blue-500 dark:focus:ring-cyan-400 focus:border-transparent outline-none transition-all duration-200 appearance-none cursor-pointer">
            <option value="Adventure">🏔️ Adventure</option>
            <option value="Relaxation">🏖️ Relaxation</option>
            <option value="Cultural">🏛️ Cultural</option>
            <option value="Romantic">💕 Romantic</option>
            <option value="Party">🎉 Party</option>
          </select>
        </div>
        <div class="sm:col-span-2 flex flex-col sm:flex-row gap-3 mt-2">
          <button type="submit" id="generateBtn"
            class="flex-1 px-6 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-cyan-500 dark:to-indigo-500 text-white font-bold text-base rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 shadow-lg shadow-blue-500/25 dark:shadow-cyan-500/20 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
            Generate Plan 🚀
          </button>
          <button type="reset" id="resetBtn"
            class="px-6 py-3.5 bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-slate-200 font-semibold text-base rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 border border-gray-300 dark:border-slate-600">
            Reset
          </button>
        </div>
      </form>
    </section>

    <!-- Loading -->
    <div id="loading" class="hidden flex flex-col items-center justify-center py-16 animate-fade-in">
      <div class="relative w-16 h-16 mb-4">
        <div class="absolute inset-0 rounded-full border-4 border-blue-200 dark:border-slate-600"></div>
        <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-blue-600 dark:border-t-cyan-400 animate-spin"></div>
      </div>
      <p class="text-gray-500 dark:text-slate-400 text-lg font-medium">AI is planning your trip...</p>
      <p class="text-gray-400 dark:text-slate-500 text-sm mt-1">Crafting the perfect itinerary</p>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 rounded-xl p-4 mb-6 animate-fade-in text-center"></div>

    <!-- Itinerary Results -->
    <section id="results" class="hidden animate-fade-in"></section>

  </main>

  <!-- Footer -->
  <footer class="text-center py-6 text-gray-400 dark:text-slate-500 text-sm">
    Made with ❤️ · AI Travel Planner
  </footer>

  <script src="script.js"></script>
</body>
</html>
